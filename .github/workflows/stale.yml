name: Close stale issues and PRs

on:
  schedule:
    - cron: '30 1 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: 'This issue is stale because it has had no activity for 30 days.'
          stale-pr-message: 'This PR is stale because it has had no activity for 30 days.'
          days-before-stale: 30
          days-before-close: 7
